version: "3.9"

services:
  web:
    build: .
    container_name: crave_killer_web
    restart: always
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NODE_ENV: production
    ports:
      - "5000:5000"

  bot:
    build: ./bot
    container_name: crave_killer_bot
    restart: always
    environment:
      DATABASE_URL: ${DATABASE_URL}
      BOT_TOKEN: ${BOT_TOKEN}
    dns:
      - 8.8.8.8
      - 1.1.1.1