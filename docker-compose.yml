version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: crave_killer_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: crave_killer
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  web:
    build: .
    container_name: crave_killer_web
    restart: always
    depends_on:
      - postgres
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NODE_ENV: production
    ports:
      - "5000:5000"

  migrate:
    build:
      context: .
      target: builder
    depends_on:
      - postgres
    environment:
      DATABASE_URL: ${DATABASE_URL}
    command: sh -c "npm run db:push"

  bot:
    build: ./bot
    container_name: crave_killer_bot
    restart: always
    depends_on:
      - postgres
    environment:
      DATABASE_URL: ${DATABASE_URL}
      BOT_TOKEN: ${BOT_TOKEN}

volumes:
  pgdata: