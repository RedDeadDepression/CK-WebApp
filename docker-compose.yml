services:
  web:
    build: .
    container_name: crave_killer_web
    restart: always
    env_file:
      - .env
    environment:
      NODE_ENV: production
    ports:
      - "5000:5000"

  bot:
    build: ./bot
    container_name: crave_killer_bot
    restart: always
    env_file:
      - .env
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
    dns:
      - 8.8.8.8
      - 1.1.1.1